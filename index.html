<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Calendar — Client Activity Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #dadce0;
    --border-light: #e8eaed;
    --text: #202124;
    --text-secondary: #5f6368;
    --text-muted: #80868b;
    --accent: #1a73e8;
    --accent-light: #d2e3fc;
    --accent-hover: #1765cc;
    --accent-bg: #e8f0fe;
    --danger: #d93025;
    --danger-light: #fce8e6;
    --success: #1e8e3e;
    --success-light: #e6f4ea;
    --warning: #f9ab00;
    --warning-light: #fef7e0;
    --font: 'DM Sans', 'Google Sans', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --shadow-sm: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
    --shadow-md: 0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
    --shadow-lg: 0 4px 8px 0 rgba(60,64,67,.3), 0 8px 16px 4px rgba(60,64,67,.15);
    --radius: 8px;
    --hour-h: 60px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
::selection { background: var(--accent-light); }

/* ===== LOGIN ===== */
.login-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e8f0fe 0%, #f8f9fa 100%); }
.login-card { background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-md); padding: 44px 36px; width: 100%; max-width: 400px; }
.login-card h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.02em; }
.login-card .sub { color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 28px; }
.login-card label { display: block; font-size: 0.76rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); margin-bottom: 5px; }
.login-card input[type="text"], .login-card input[type="password"] { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 0.92rem; margin-bottom: 14px; outline: none; transition: border .2s, box-shadow .2s; }
.login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.btn-login { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-login:hover { background: var(--accent-hover); }
.btn-login:disabled { opacity: .55; cursor: not-allowed; }
.login-err { display: none; margin-top: 12px; padding: 10px 12px; background: var(--danger-light); border-radius: 6px; color: var(--danger); font-size: 0.82rem; }

/* ===== APP SHELL ===== */
.app { display: none; height: 100vh; flex-direction: column; }
.app.active { display: flex; }

/* Top bar */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 30; min-height: 56px; }
.topbar-brand { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; }
.topbar-brand span { color: var(--accent); }
.topbar-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

/* Nav group */
.nav-group { display: flex; align-items: center; gap: 4px; }
.nav-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; color: var(--text-secondary); transition: background .15s; }
.nav-btn:hover { background: var(--border-light); }
.month-title { font-size: 1.05rem; font-weight: 600; min-width: 160px; text-align: center; }
.today-btn { padding: 6px 18px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--text); }
.today-btn:hover { background: var(--border-light); }

/* View toggle */
.view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-left: 8px; }
.view-toggle button { padding: 6px 14px; border: none; background: var(--surface); font-family: var(--font); font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--text-secondary); transition: all .15s; }
.view-toggle button:not(:last-child) { border-right: 1px solid var(--border); }
.view-toggle button.active { background: var(--accent-bg); color: var(--accent); }
.view-toggle button:hover:not(.active) { background: var(--border-light); }

.topbar-spacer { flex: 1; }
.user-pill { background: var(--border-light); border-radius: 20px; padding: 5px 14px; font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
.btn-link { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); font-family: var(--font); font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--text); text-decoration: none; transition: all .15s; }
.btn-link:hover { background: var(--border-light); }
.btn-danger { color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: var(--danger-light); }

/* ===== HOURS SUMMARY BAR ===== */
.summary-bar { 
    background: var(--surface); 
    border-bottom: 1px solid var(--border); 
    padding: 8px 20px; 
    display: flex; 
    align-items: center; 
    gap: 20px; 
    flex-shrink: 0;
    overflow-x: auto;
}
.summary-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }
.summary-val { font-family: var(--font-mono); font-weight: 600; font-size: 0.88rem; }
.summary-val.blue { color: var(--accent); }
.summary-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===== LOCK BANNER ===== */
.lock-banner { display: none; padding: 8px 20px; background: var(--danger-light); border-bottom: 1px solid #f5c6c2; font-size: 0.8rem; color: var(--danger); font-weight: 500; flex-shrink: 0; }
.lock-banner.active { display: block; }

/* ===== CALENDAR GRID ===== */
.cal-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* Day header row */
.day-header-row { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.time-gutter-header { width: 64px; flex-shrink: 0; border-right: 1px solid var(--border-light); padding: 10px 4px; text-align: center; font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.day-header { flex: 1; text-align: center; padding: 8px 4px 10px; cursor: default; }
.day-header .day-name { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
.day-header .day-num { font-size: 1.5rem; font-weight: 600; margin-top: 2px; width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; transition: background .15s; }
.day-header.today .day-name { color: var(--accent); }
.day-header.today .day-num { background: var(--accent); color: #fff; }
.day-header .day-total { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

/* Scrollable time grid */
.time-grid-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.time-grid { display: flex; position: relative; }
.time-gutter { width: 64px; flex-shrink: 0; }
.time-gutter-label { height: var(--hour-h); display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 8px; font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono); transform: translateY(-8px); }
.day-columns { flex: 1; display: flex; position: relative; }
.day-col { flex: 1; position: relative; border-right: 1px solid var(--border-light); min-height: calc(var(--hour-h) * 17); /* 6am-11pm */ }
.day-col:last-child { border-right: none; }

/* Hour lines */
.hour-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--border-light); pointer-events: none; z-index: 1; }
.hour-line.half { background: var(--border-light); opacity: 0.5; }

/* Current time indicator */
.now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--danger); z-index: 15; pointer-events: none; }
.now-dot { position: absolute; left: -5px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--danger); }

/* Drag selection */
.drag-preview { position: absolute; left: 2px; right: 2px; background: var(--accent-light); border: 2px solid var(--accent); border-radius: 6px; opacity: 0.7; z-index: 10; pointer-events: none; display: none; min-height: 15px; }

/* Plan blocks */
.plan-block { position: absolute; left: 3px; right: 3px; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; overflow: hidden; cursor: pointer; z-index: 5; transition: box-shadow .15s, transform .1s; border-left: 4px solid; display: flex; flex-direction: column; }
.plan-block:hover { box-shadow: var(--shadow-sm); transform: scale(1.01); z-index: 12; }
.plan-block .pb-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.plan-block .pb-meta { font-size: 0.68rem; opacity: 0.75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.plan-block .pb-time { font-family: var(--font-mono); font-size: 0.66rem; opacity: 0.7; }

/* Locked column overlay */
.day-col.locked::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(217,48,37,.03) 5px, rgba(217,48,37,.03) 10px); z-index: 2; pointer-events: none; }

/* ===== MODAL ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.32); backdrop-filter: blur(3px); z-index: 100; align-items: flex-start; justify-content: center; padding: 60px 20px 20px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-lg); width: 100%; max-width: 460px; animation: modalIn .2s ease-out; }
@keyframes modalIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.modal-head { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-head h2 { font-size: 1.1rem; font-weight: 700; }
.modal-x { width: 30px; height: 30px; border-radius: 50%; border: none; background: transparent; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: background .15s; }
.modal-x:hover { background: var(--border-light); }
.modal-body { padding: 16px 24px 24px; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 4px; }
.fi, .fs, .ft { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--font); font-size: 0.88rem; outline: none; transition: border .2s, box-shadow .2s; background: var(--surface); }
.fi:focus, .fs:focus, .ft:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.ft { resize: vertical; min-height: 60px; }
.fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.time-display { padding: 9px 12px; background: var(--accent-bg); border-radius: 6px; font-family: var(--font-mono); font-size: 0.88rem; color: var(--accent); font-weight: 600; text-align: center; border: 1.5px solid var(--accent-light); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 10px; border-top: 1px solid var(--border-light); margin-top: 6px; }
.mbtn { padding: 9px 20px; border-radius: 6px; font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .15s; }
.mbtn:hover { background: var(--border-light); }
.mbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.mbtn.primary:hover { background: var(--accent-hover); }
.mbtn.del { color: var(--danger); border-color: transparent; background: transparent; margin-right: auto; }
.mbtn.del:hover { background: var(--danger-light); }
.mbtn:disabled { opacity: .5; cursor: not-allowed; }

/* ===== TOAST ===== */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(70px); padding: 10px 24px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; z-index: 200; box-shadow: var(--shadow-md); transition: transform .3s ease; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: var(--success); color: #fff; }
.toast.err { background: var(--danger); color: #fff; }
.toast.inf { background: var(--accent); color: #fff; }

/* Responsive */
@media (max-width: 768px) {
    .topbar { padding: 6px 12px; gap: 6px; flex-wrap: wrap; }
    .month-title { font-size: .9rem; min-width: 120px; }
    .time-gutter, .time-gutter-header { width: 44px; }
    .day-header .day-num { font-size: 1.15rem; width: 34px; height: 34px; }
    .plan-block { font-size: .68rem; padding: 3px 5px; }
    .summary-bar { padding: 6px 12px; gap: 12px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
    <div class="login-card">
        <h1>📅 Plan Calendar</h1>
        <p class="sub">Login to manage planned activities</p>
        <div><label>Username</label><input type="text" id="loginUser" placeholder="Enter username"></div>
        <div><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"></div>
        <button class="btn-login" id="loginBtn">Login</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- APP -->
<div id="app" class="app">
    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-brand">📅 <span>Plan</span> Calendar</div>
        <div class="topbar-sep"></div>
        <button class="today-btn" id="todayBtn">Today</button>
        <div class="nav-group">
            <button class="nav-btn" id="prevBtn">‹</button>
            <span class="month-title" id="monthTitle"></span>
            <button class="nav-btn" id="nextBtn">›</button>
        </div>
        <div class="view-toggle">
            <button id="viewWeek" class="active">Week</button>
            <button id="viewMonth">Month</button>
        </div>
        <div class="topbar-spacer"></div>
        <span class="user-pill" id="userPill"></span>
        <a class="btn-link" id="trackerLink" href="https://arvindpugalia95.github.io/SimpleReportScript/" target="_self">← Tracker</a>
        <button class="btn-link btn-danger" id="logoutBtn">Logout</button>
    </div>

    <!-- SUMMARY BAR -->
    <div class="summary-bar" id="summaryBar">
        <div class="summary-item"><div class="summary-dot" style="background:var(--accent)"></div>This week: <span class="summary-val blue" id="sumWeek">0h</span></div>
    </div>

    <!-- LOCK BANNER -->
    <div class="lock-banner" id="lockBanner"></div>

    <!-- CALENDAR -->
    <div class="cal-wrap">
        <!-- Day headers -->
        <div class="day-header-row" id="dayHeaderRow">
            <div class="time-gutter-header">GMT+5:30</div>
        </div>
        <!-- Time grid scroll area -->
        <div class="time-grid-scroll" id="gridScroll">
            <div class="time-grid" id="timeGrid">
                <div class="time-gutter" id="timeGutter"></div>
                <div class="day-columns" id="dayCols"></div>
            </div>
        </div>
    </div>

    <!-- MONTH VIEW (hidden by default) -->
    <div id="monthView" style="display:none; flex:1; overflow-y:auto; padding:0 20px 20px;"></div>
</div>

<!-- PLAN MODAL -->
<div class="modal-overlay" id="planModal">
    <div class="modal">
        <div class="modal-head"><h2 id="mTitle">Add Plan</h2><button class="modal-x" id="mClose">×</button></div>
        <div class="modal-body">
            <div class="fg"><label>Date</label><input type="date" class="fi" id="mDate"></div>
            <div class="fr2">
                <div class="fg"><label>Start Time</label><select class="fs" id="mStart"></select></div>
                <div class="fg"><label>End Time</label><select class="fs" id="mEnd"></select></div>
            </div>
            <div class="fg"><label>Planned Hours (auto)</label><div class="time-display" id="mHoursDisplay">0.00 h</div></div>
            <div class="fr2">
                <div class="fg"><label>Client</label><select class="fs" id="mClient"><option value="">Select…</option></select></div>
                <div class="fg"><label>Project</label><select class="fs" id="mProject"><option value="">Select client…</option></select></div>
            </div>
            <div class="fg"><label>Activity</label><textarea class="ft" id="mActivity" rows="2" placeholder="What will you work on?"></textarea></div>
            <div class="fr2">
                <div class="fg"><label>Type</label><select class="fs" id="mType"><option value="">Select…</option><option value="Recurring">Recurring</option><option value="Adhoc">Adhoc</option></select></div>
                <div class="fg"><label>Admin / Approver</label><select class="fs" id="mAdmin"><option value="">Select…</option></select></div>
            </div>
            <div class="modal-actions">
                <button class="mbtn del" id="mDelete" style="display:none">Delete</button>
                <button class="mbtn" id="mCancel">Cancel</button>
                <button class="mbtn primary" id="mSave">Save Plan</button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

const GAS = 'https://script.google.com/macros/s/AKfycbzlKdHrNToeJrV9X6Z4bV_QC0rL9HzhW7i_QjFFEmM-Bmypbkf7aJrF1VWB0pM6TXo8/exec';
const START_HOUR = 6; // 6 AM
const END_HOUR = 23;  // 11 PM
const HOURS_COUNT = END_HOUR - START_HOUR;
const SLOT_H = 60; // px per hour

// State
let user = null, role = null;
let clients = [], projects = {}, admins = [];
let plans = []; // { dateStr, client, project, activity, plannedHours, type, admin, startTime, endTime, status, planId, rowIndex }
let weekStart = null; // Sunday
let lockDate = '', lockH = -1, lockM = -1, lockFmt = '', srvOffset = 0;
let currentView = 'week'; // 'week' | 'month'
let currentMonthYear = null; // for month view

// Colors by client
const PALETTE = [
    {bg:'#d2e3fc',bdr:'#1a73e8',tx:'#174ea6'}, {bg:'#ceead6',bdr:'#1e8e3e',tx:'#137333'},
    {bg:'#fce8e6',bdr:'#d93025',tx:'#a50e0e'}, {bg:'#fef7e0',bdr:'#f9ab00',tx:'#b06000'},
    {bg:'#e8daef',bdr:'#9334e6',tx:'#5e0d8b'}, {bg:'#cbf0f8',bdr:'#12a4b4',tx:'#0d6d6a'},
    {bg:'#fce4ec',bdr:'#e91e63',tx:'#880e4f'}, {bg:'#e8eaf6',bdr:'#3f51b5',tx:'#283593'},
    {bg:'#fff9c4',bdr:'#f9a825',tx:'#e65100'}, {bg:'#f3e5f5',bdr:'#ab47bc',tx:'#6a1b9a'},
];
let colorMap = {};

const $ = id => document.getElementById(id);

// ===== TOAST =====
function toast(msg, type='inf') {
    const t = $('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== SERVER TIME =====
function srvNow() { return new Date(Date.now() + srvOffset); }
function srvDateStr() { const d = srvNow(); return d.getFullYear()+'-'+S(d.getMonth()+1)+'-'+S(d.getDate()); }
function S(n) { return String(n).padStart(2,'0'); }
function isLocked(ds) {
    if (!lockDate) return false;
    if (ds < lockDate) return true;
    if (ds === lockDate && lockH >= 0) {
        const n = srvNow(), nd = srvDateStr(), h = n.getHours(), m = n.getMinutes();
        if (nd > lockDate) return true;
        if (nd === lockDate && (h > lockH || (h === lockH && m >= lockM))) return true;
    }
    return false;
}

// ===== TIME HELPERS =====
function timeSlots() {
    const slots = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) {
        for (let m = 0; m < 60; m += 15) {
            if (h === END_HOUR && m > 0) break;
            slots.push({ h, m, label: fmtTime(h, m) });
        }
    }
    return slots;
}
function fmtTime(h, m) {
    const ampm = h >= 12 ? 'PM' : 'AM';
    const dh = h % 12 || 12;
    return dh + ':' + S(m) + ' ' + ampm;
}
function timeToY(h, m) { return (h - START_HOUR) * SLOT_H + (m / 60) * SLOT_H; }
function yToTime(y) {
    const totalMin = (y / SLOT_H) * 60;
    let h = START_HOUR + Math.floor(totalMin / 60);
    let m = Math.round(totalMin % 60 / 15) * 15;
    if (m >= 60) { m = 0; h++; }
    if (h > END_HOUR) { h = END_HOUR; m = 0; }
    return { h, m };
}
function calcHours(sh, sm, eh, em) { return Math.max(0, ((eh * 60 + em) - (sh * 60 + sm)) / 60); }

// ===== AUTH =====
async function login() {
    const u = $('loginUser').value.trim(), p = $('loginPass').value.trim(), err = $('loginErr'), btn = $('loginBtn');
    if (!u || !p) { err.textContent = 'Enter both fields'; err.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Logging in…'; err.style.display = 'none';
    try {
        const r = await (await fetch(`${GAS}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)).json();
        if (r.status === 'success') { user = u; role = r.role || 'data'; sessionStorage.setItem('cu', u); sessionStorage.setItem('cr', role); showApp(); }
        else { err.textContent = r.message || 'Invalid'; err.style.display = 'block'; }
    } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
    finally { btn.disabled = false; btn.textContent = 'Login'; }
}

function normPlan(p, status) {
    let ds = p.date;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(ds)) { try { const d = new Date(ds); if(!isNaN(d)) ds = d.getFullYear()+'-'+S(d.getMonth()+1)+'-'+S(d.getDate()); } catch(e){} }
    
    // Try to extract start/end from stored metadata or default based on hours
    const hrs = parseFloat(p.plannedHours) || 1;
    // Default start: 9 AM
    let sh = 9, sm = 0, eh, em;
    
    // Check if activity contains time info like "[10:00-12:30]"
    const tmatch = (p.activity||'').match(/\[(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})\]/);
    if (tmatch) {
        sh = parseInt(tmatch[1]); sm = parseInt(tmatch[2]);
        eh = parseInt(tmatch[3]); em = parseInt(tmatch[4]);
    } else {
        // Stack plans by checking existing plans on same date
        const existing = plans.filter(x => x.dateStr === ds);
        if (existing.length > 0) {
            // Find latest end
            let latestEnd = 9 * 60;
            existing.forEach(x => { const e = x.endH * 60 + x.endM; if (e > latestEnd) latestEnd = e; });
            sh = Math.floor(latestEnd / 60);
            sm = latestEnd % 60;
        }
        const totalMin = hrs * 60;
        const endMin = sh * 60 + sm + totalMin;
        eh = Math.floor(endMin / 60);
        em = endMin % 60;
    }
    
    if (eh > END_HOUR) { eh = END_HOUR; em = 0; }
    
    return {
        dateStr: ds, client: p.client, project: p.project, activity: (p.activity||'').replace(/\[\d{1,2}:\d{2}\s*-\s*\d{1,2}:\d{2}\]\s*/, ''),
        plannedHours: hrs, type: p.type||'Recurring', admin: p.admin||p.approver||'',
        startH: sh, startM: sm, endH: eh, endM: em,
        status, planId: p.planId||'', rowIndex: p.rowIndex||null,
        submittedBy: p.submittedBy || user
    };
}

// ===== WEEK CALCULATION =====
function getWeekOf(date) {
    const d = new Date(date);
    const day = d.getDay();
    const sun = new Date(d);
    sun.setDate(d.getDate() - day);
    sun.setHours(0,0,0,0);
    return sun;
}
function weekDates() {
    const dates = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(weekStart);
        d.setDate(weekStart.getDate() + i);
        dates.push(d);
    }
    return dates;
}
function dateStr(d) { return d.getFullYear()+'-'+S(d.getMonth()+1)+'-'+S(d.getDate()); }

// ===== DRAG TO CREATE =====
function setupDrag(col, ds, preview) {
    let dragging = false, startY = 0, currentY = 0;

    col.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('plan-block') || e.target.closest('.plan-block')) return;
        e.preventDefault();
        dragging = true;
        const rect = col.getBoundingClientRect();
        startY = e.clientY - rect.top + col.parentElement.parentElement.parentElement.scrollTop;
        // Snap to 15 min
        const t = yToTime(startY);
        startY = timeToY(t.h, t.m);
        currentY = startY;
        preview.style.display = 'block';
        preview.style.top = startY + 'px';
        preview.style.height = (SLOT_H / 4) + 'px'; // min 15 min
    });

    col.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rect = col.getBoundingClientRect();
        currentY = e.clientY - rect.top + col.parentElement.parentElement.parentElement.scrollTop;
        const t = yToTime(currentY);
        currentY = timeToY(t.h, t.m);
        const top = Math.min(startY, currentY);
        const height = Math.max(Math.abs(currentY - startY), SLOT_H / 4);
        preview.style.top = top + 'px';
        preview.style.height = height + 'px';
    });

    const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        preview.style.display = 'none';
        
        let y1 = Math.min(startY, currentY);
        let y2 = Math.max(startY, currentY);
        if (y2 - y1 < SLOT_H / 4) y2 = y1 + SLOT_H / 4; // min 15 min
        
        const t1 = yToTime(y1);
        const t2 = yToTime(y2);
        // Ensure at least 15 min
        if (t1.h === t2.h && t1.m === t2.m) { t2.m += 15; if(t2.m>=60){t2.m=0;t2.h++;} }
        
        openModal(ds, t1.h, t1.m, t2.h, t2.m);
    };

    col.addEventListener('mouseup', endDrag);
    col.addEventListener('mouseleave', () => { if(dragging) endDrag(); });

    // Click to create (1 hour block)
    col.addEventListener('click', (e) => {
        if (e.target.classList.contains('plan-block') || e.target.closest('.plan-block')) return;
        // Don't fire if drag happened
    });
}

async function savePlan() {
    const ds = $('mDate').value;
    const sv = $('mStart').value.split(':');
    const ev = $('mEnd').value.split(':');
    const client = $('mClient').value;
    const project = $('mProject').value;
    const activity = $('mActivity').value.trim();
    const type = $('mType').value;
    const admin = $('mAdmin').value;
    
    if (!ds || !client || !project || !activity || !type || !admin) { toast('Fill all fields', 'err'); return; }
    
    const sh = +sv[0], sm = +sv[1], eh = +ev[0], em = +ev[1];
    const hours = calcHours(sh, sm, eh, em);
    if (hours <= 0) { toast('End time must be after start time', 'err'); return; }
    if (isLocked(ds)) { toast('Date is locked', 'err'); return; }
    
    const btn = $('mSave');
    btn.disabled = true; btn.textContent = 'Saving…';
    
    // Encode time range in activity so we can restore position
    const activityWithTime = `[${sh}:${S(sm)}-${eh}:${S(em)}] ${activity}`;
    
    try {
        const mode = btn.dataset.mode;
        
        if (mode === 'edit' && btn.dataset.rowIndex) {
            // Update existing plan
            await fetch(GAS, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    action: 'editPlanItem',
                    rowIndex: parseInt(btn.dataset.rowIndex),
                    updates: { date: ds, client, project, activity: activityWithTime, plannedHours: hours, type }
                })
            });
        } else {
            // Create new
            await fetch(GAS, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    action: 'submitPlan',
                    activities: [{ date: ds, clientName: client, project, activity: activityWithTime, plannedHours: hours, adminAssigned: admin, type, user }],
                    submittedBy: user,
                    isAdmin: true
                })
            });
        }
        
        closeModal();
        toast('Plan saved!', 'ok');
        setTimeout(() => loadPlans(), 1000);
    } catch(e) { toast('Error: '+e.message, 'err'); }
    finally { btn.disabled = false; btn.textContent = mode === 'edit' ? 'Update Plan' : 'Save Plan'; }
}

async function deletePlan() {
    const ri = $('mDelete').dataset.rowIndex;
    const pid = $('mDelete').dataset.planId;
    if (!ri && !pid) { toast('Cannot delete', 'err'); return; }
    if (!confirm('Delete this plan?')) return;
    
    try {
        await fetch(GAS, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action: 'rejectPlan', planId: pid, rowIndices: ri ? [parseInt(ri)] : undefined })
        });
        closeModal();
        toast('Plan deleted', 'ok');
        setTimeout(() => loadPlans(), 1000);
    } catch(e) { toast('Error: '+e.message, 'err'); }
}

function goToday() {
    weekStart = getWeekOf(new Date());
    currentMonthYear = new Date();
    render();

function goPrev() {
    if (currentView === 'week') {
        weekStart = new Date(weekStart);
        weekStart.setDate(weekStart.getDate() - 7);
    } else {
        if (!currentMonthYear) currentMonthYear = new Date();
        currentMonthYear = new Date(currentMonthYear.getFullYear(), currentMonthYear.getMonth() - 1, 1);
    }
    render();
}
function goNext() {
    if (currentView === 'week') {
        weekStart = new Date(weekStart);
        weekStart.setDate(weekStart.getDate() + 7);
    } else {
        if (!currentMonthYear) currentMonthYear = new Date();
        currentMonthYear = new Date(currentMonthYear.getFullYear(), currentMonthYear.getMonth() + 1, 1);
    }
    render();
}

function switchView(v) {
    currentView = v;
    $('viewWeek').classList.toggle('active', v==='week');
    $('viewMonth').classList.toggle('active', v==='month');
    if (v === 'month' && !currentMonthYear) currentMonthYear = weekStart || new Date();
    render();
}

// ===== SHOW APP =====
async function showApp() {
    $('loginPage').style.display = 'none';
    $('app').classList.add('active');
    $('userPill').textContent = user + ' (' + (role==='admin'?'Admin':'User') + ')';
    weekStart = getWeekOf(new Date());
    currentMonthYear = new Date();
    populateTimeSelects();
    await loadAll();
}

// ===== INIT =====
function init() {
    $('loginBtn').addEventListener('click', login);
    $('loginPass').addEventListener('keypress', e => { if(e.key==='Enter') login(); });
    $('logoutBtn').addEventListener('click', logout);
    $('todayBtn').addEventListener('click', goToday);
    $('prevBtn').addEventListener('click', goPrev);
    $('nextBtn').addEventListener('click', goNext);
    $('viewWeek').addEventListener('click', () => switchView('week'));
    $('viewMonth').addEventListener('click', () => switchView('month'));
    $('mClose').addEventListener('click', closeModal);
    $('mCancel').addEventListener('click', closeModal);
    $('mSave').addEventListener('click', savePlan);
    $('mDelete').addEventListener('click', deletePlan);
    $('mStart').addEventListener('change', updateHoursDisplay);
    $('mEnd').addEventListener('change', updateHoursDisplay);
    $('mClient').addEventListener('change', updateProjectDropdown);
    $('planModal').addEventListener('click', e => { if(e.target===$('planModal')) closeModal(); });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if ($('planModal').classList.contains('active')) return;
        if (e.key === 'ArrowLeft') goPrev();
        if (e.key === 'ArrowRight') goNext();
    });

    // Session
    const su = sessionStorage.getItem('cu'), sr = sessionStorage.getItem('cr');
    if (su && sr) { user = su; role = sr; showApp(); }
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
